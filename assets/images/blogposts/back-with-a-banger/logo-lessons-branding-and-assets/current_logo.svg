<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="Neunerln">
  <defs>
    <pattern
      id="nl-pat"
      x="0"
      y="0"
      width="20"
      height="20"
      patternUnits="userSpaceOnUse"
      patternTransform="rotate(22)"
    >
      <rect width="20" height="20" fill="#0098d4" />
      <polygon points="5,0 10,10 5,20 0,10" fill="#ffffff" />
      <polygon points="15,0 20,10 15,20 10,10" fill="#ffffff" />
    </pattern>
    <linearGradient id="nl-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2d78a" />
      <stop offset="45%" stop-color="#c9a25c" />
      <stop offset="100%" stop-color="#8a6a35" />
    </linearGradient>
    <filter id="nl-filt" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect
    x="6"
    y="6"
    width="88"
    height="88"
    rx="14"
    fill="url(#nl-pat)"
    stroke="url(#nl-grad)"
    stroke-width="3"
    filter="url(#nl-filt)"
  />

  <polygon
    points="50,20 80,50 50,80 20,50"
    fill="#fff9ef"
    stroke="#c9a25c"
    stroke-width="1.5"
    opacity="0.98"
  />
  <polygon
    points="50,28 72,50 50,72 28,50"
    fill="#ffffff"
    stroke="#0098d4"
    stroke-width="1.1"
    opacity="0.95"
  />

  <g transform="translate(50 50)">
    <text
      x="0"
      y="0"
      text-anchor="middle"
      dominant-baseline="central"
      fill="url(#nl-grad)"
      stroke="#5c4520"
      stroke-width="0.6"
      stroke-opacity="0.45"
      paint-order="stroke fill"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="34"
      font-weight="700"
      style="user-select: none"
    >
      N
    </text>
  </g>
</svg>